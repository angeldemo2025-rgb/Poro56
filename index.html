<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario PRO v9</title>

<style>
:root{
  --bg:#eaf4ff;
  --card:#ffffff;
  --text:#000;
  --primary:#1e88e5;
}

body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#fff;
  --primary:#3b82f6;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  background:var(--primary);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{ padding:10px; }

.card{
  background:var(--card);
  padding:10px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item{ flex:1; }
.qty{ width:60px; text-align:right; }

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:3px;
}

.btn{ background:var(--primary); color:white; }
.btn-green{ background:#22c55e; color:white; }

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  background:var(--primary);
  color:white;
}

input{
  padding:10px;
  width:90%;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.title{
  font-size:18px;
  font-weight:bold;
  margin:10px 0;
}
</style>
</head>

<body>

<header>
  <button id="backBtn" onclick="back()" style="display:none;">⬅️</button>
  <span>📦 Inventario PRO v9</span>
  <div>
    <button onclick="toggleTheme()">🌗</button>
    <button id="shareBtn" onclick="shareList()" style="display:none;">📤</button>
  </div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email creador"/>
  <button class="btn" onclick="login()">Entrar como creador</button>
</div>

<!-- LISTAS -->
<div id="creator" style="display:none;">
  <button class="btn-green" onclick="crearLista()">+ Lista</button>
  <div id="listas"></div>
</div>

<!-- EDITOR -->
<div id="editor" style="display:none;"></div>

<!-- VIEW -->
<div id="viewer" style="display:none;"></div>

</div>

<button class="fab" onclick="addItemQuick()">+</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, update } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzYkCG7aMTJxH2NH-_xJ7utAtOV4jjcfU",
  authDomain: "checklist-bb0f7.firebaseapp.com",
  databaseURL: "https://checklist-bb0f7-default-rtdb.firebaseio.com",
  projectId: "checklist-bb0f7",
  storageBucket: "checklist-bb0f7.firebasestorage.app",
  messagingSenderId: "606230877523",
  appId: "1:606230877523:web:4b147af89d07c76f21bda6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user="";
let currentList=null;
let role="viewer";
let currentListName="";

/* URL MODE */
const params = new URLSearchParams(window.location.search);
const modo = params.get("modo");
const idFromUrl = params.get("id");

/* AUTO VIEW MODE */
if(modo==="view" && idFromUrl){
  currentList = idFromUrl;
  role="viewer";

  document.getElementById("login").style.display="none";
  document.getElementById("creator").style.display="none";

  showButtons(false);
  openViewer(idFromUrl);
}

/* THEME */
window.toggleTheme=()=>{
  document.body.classList.toggle("dark");
}

/* HEADER BUTTONS */
function showButtons(show){
  document.getElementById("backBtn").style.display = show ? "block" : "none";
  document.getElementById("shareBtn").style.display = show ? "block" : "none";
}

/* LOGIN CREATOR */
window.login=()=>{

  if(modo==="view") return;

  user=document.getElementById("email").value;

  if(user.includes("@")){
    document.getElementById("login").style.display="none";
    document.getElementById("creator").style.display="block";
    loadLists();
  }
}

/* BACK */
window.back=()=>{
  showButtons(false);
  document.getElementById("editor").style.display="none";
  document.getElementById("viewer").style.display="none";
  document.getElementById("creator").style.display="block";
}

/* CREATE LIST */
window.crearLista=()=>{
  let name=prompt("Nombre lista");
  if(!name) return;

  let id=push(ref(db,"listas")).key;

  set(ref(db,"listas/"+id),{
    nombre:name,
    creador:user,
    items:{}
  });
}

/* LOAD LISTS */
function loadLists(){
  onValue(ref(db,"listas"),snap=>{
    let div=document.getElementById("listas");
    div.innerHTML="";

    snap.forEach(l=>{
      div.innerHTML+=`
      <div class="card">
        <b>${l.val().nombre}</b><br/>
        <button class="btn" onclick="openList('${l.key}')">Abrir</button>
      </div>`;
    });
  });
}

/* OPEN LIST */
window.openList=(id)=>{
  currentList=id;

  onValue(ref(db,"listas/"+id),snap=>{
    let data=snap.val();

    currentListName = data.nombre;
    showButtons(true);

    if(data.creador===user){
      role="creator";
      openCreator(id);
    }else{
      role="viewer";
      openViewer(id);
    }
  });
}

/* CREATOR VIEW */
function openCreator(id){

  document.getElementById("creator").style.display="none";
  document.getElementById("viewer").style.display="none";
  document.getElementById("editor").style.display="block";

  onValue(ref(db,"listas/"+id+"/items"),snap=>{
    let html=`<div class="title">📦 ${currentListName}</div><h3>✏️ Editor</h3>`;

    snap.forEach(i=>{
      html+=`
      <div class="card row">

        <input class="item"
        value="${i.val().name}"
        onchange="editName('${id}','${i.key}',this.value)"/>

        <input class="qty"
        type="number"
        value="${i.val().qty}"
        onchange="editQty('${id}','${i.key}',this.value)"/>

      </div>`;
    });

    document.getElementById("editor").innerHTML=html;
  });
}

/* VIEW MODE */
function openViewer(id){

  document.getElementById("creator").style.display="none";
  document.getElementById("editor").style.display="none";
  document.getElementById("viewer").style.display="block";

  showButtons(false);

  onValue(ref(db,"listas/"+id+"/items"),snap=>{
    let html=`<div class="title">📦 ${currentListName}</div><h3>📋 Lista</h3>`;

    snap.forEach(i=>{
      html+=`
      <div class="card row">
        <div class="item">${i.val().name}</div>
        <div class="qty">${i.val().qty}</div>
      </div>`;
    });

    document.getElementById("viewer").innerHTML=html;
  });
}

/* EDIT */
window.editName=(l,i,v)=>{
  if(role!=="creator") return;
  update(ref(db,"listas/"+l+"/items/"+i),{name:v});
}

window.editQty=(l,i,v)=>{
  if(role!=="creator") return;
  update(ref(db,"listas/"+l+"/items/"+i),{qty:v});
}

/* ADD ITEM */
window.addItemQuick=()=>{
  if(role!=="creator") return alert("Solo creador");

  let name=prompt("Artículo");
  let qty=prompt("Cantidad");

  let id=push(ref(db,"listas/"+currentList+"/items")).key;

  set(ref(db,"listas/"+currentList+"/items/"+id),{
    name, qty
  });
}

/* SHARE VIEW LINK */
window.shareList=()=>{
  let link = location.origin + "?modo=view&id=" + currentList;

  navigator.clipboard.writeText(link);
  alert("Link VIEW copiado 📋");
}

</script>

</body>
</html>
